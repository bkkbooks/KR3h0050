body:
  text: 書法雅言藝術類一書畫之屬提要臣等謹案書法雅言一卷明項穆撰王穉登所作穆小𫝊稱其初名徳枝郡大夫徐公易為純後乃更名穆字徳純號曰貞元亦號曰無邪子秀水項元汴之子也元汴鑒藏書畫甲于一時至今論真迹者尚以墨林印記别真偽穆承其家學耳濡目染故于書法特工因抒其心得作為是書凡十七篇曰書統曰古今曰辨體曰形質曰品格曰資學曰規矩曰常變曰正竒曰中和曰老少曰神化曰心相曰取舍曰功序曰器用曰知識大㫖以晉人為宗而排蘇軾米芾書為稜角怒張倪瓉書為寒儉軾芾加以工力可至古人瓉則終不可到雖持論稍為過髙而終身一藝研究至深烟楮之外實多獨契衡以取法乎上之義未始非書家之圭臬也乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀書法雅言原序余故善項子京以其家多法書名墨居恒一過展鑒時長君德純每從傍下隻語賞刺居然能書家也余笑謂子京曰此郎異日故當勝尊及余竄走疆外十餘年始歸徳純輒已自負能書又未㡬而人稱徳純能書若一口也余始進而語之曰以君名地慧才視取榮泰猶掇之耳奈何早自割棄以一藝自掩不見右軍以書掩生平為後來惜乎徳純曰假令作素王優孟與命争不可知孰若為墨卿優孟與藝争可必得也且右軍一時所稱立節則卞忠貞相業則王茂𢎞再寧淪鼎則陶長沙而已然三人者固不若右軍以書故在人人吻間不掩右軍孰大於是其辨達類如此大都徳純書於晉唐諸名家罔不該㑹苐心慕手追者逸少即稍稍降格亦不減歐虞禇李故其于蘭亭聖教必日摹一紙以自程督雖猛熱沍寒不蹔休頓嘗謂人曰比來静坐如聞泥丸中有呼右軍者此猶昔人夢見伯英亦神㑹之一驗也因著書法雅言一卷上下千載品第周贍進乎技矣至若放斥蘇米詆落元鎮更定筆陣數語乃頃近書家不敢道者又自以為倘使此終葆祕後有元常其人必當搥胷嘔血别生仲將之釁遂乞余叙而𫝊之余亦便為䑛筆庶以合語子京者之右劵繡水沈思孝序
