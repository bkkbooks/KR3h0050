  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0050_WYG_001-1a, image: WYG0816/WYG0816-0245c.png}
body:
  text: 書法雅言明項穆撰書統河馬負圖洛龜呈書此天地開文字也羲畫八卦文列六爻此聖王啓文字也若乃龍鳳龜麟之名穗雲科斗之號篆籀嗣作古隸爰興時易代新不可殫述信後傳今篆隸焉爾厯周及秦自漢逮晉真行迭起章草浸孶文字菁華敷宣盡矣然書之作也帝王之經綸聖賢之學術至于玄文內典百氏九流詩歌之勸懲碑銘之訓戒不由斯字何以紀辭故書之為功同流天地翼衛教經者也夫投壺射矢猶標觀德之名作聖述明本入列仙之品宰我稱仲尼賢于堯舜余則謂逸少兼乎鍾張大統斯垂萬世不易苐唐賢求之筋力軌度其過也嚴而謹矣宋賢求之意氣精神其過也縱而肆矣元賢求之性情體態其過也溫而柔矣其間豪傑奮起不無超越尋常槩觀習俗風聲大都互有優劣我明肇運尚襲元規豐祝文姚竊追唐躅上宗逸少大都畏難夫堯舜人皆可為翰墨何畏于彼逸少我師也所願學是焉奈自祝文絶世以後南北王馬亂真邇年以來競倣蘇米王馬疏淺俗怪易知其非蘇米激厲矜誇罕悟其失斯風一倡靡不可追攻乎異端害則滋甚况學術經綸皆由心起其心不正所動悉邪宣聖作春秋子輿距楊墨懼道將日衰也其言豈得已哉栁公權曰心正則筆正余則曰人正則書正取舍諸篇不無商韓之刻心相等論實同孔孟之思六經非心學乎傳經非六書乎正書法所以正人心也正人心以間聖道也子輿距楊墨于昔豫則放蘇米于今垂之千秋識者復起必有知正書之功不愧為聖人之徒矣古今書契之作肇自頡皇佐隸之簡興于嬴政他若鳥宿芝英之類魚蟲薤葉之流紀夢瑞于當年圖形象于一日未見真迹徒著虛名風格既湮考索何據信今傳後貴在同文探賾搜奇要非適用故書法之目止以篆隸古文兼乎真行草體書法之宗獨以羲獻蕭永佐之虞褚陸顔他若急就飛白亦當遊心歐張李栁或可涉目所謂取法乎上僅得乎中初規後賢冀追前哲匪曰生今之世不能及古之人學成一家不必廣師羣妙者也米元章云時代壓之不能髙古自畫固甚又云真者在前氣熖懾人畏彼益深至謂書不入晉徒成下品若見真迹惶恐殺人既推二王獨擅書宗又阻後人不敢學古元章功罪足相衡矣噫世之不學者固無論矣自稱能書者有二病焉巖搜海釣之夫每索隱于秦漢井坐管窺之輩恆取式于宋元太過不及厥失維均蓋謂今不及古者每云今妍古質以奴書為誚者自稱獨擅成家不學古法者無稽之徒也専泥上古者豈從周之士哉夫夏彛商鼎已非汙尊抔飲之風上棟下宇亦異巢居穴處之俗生乎三代之世不為三皇之民矧夫生今之時奚必反古之道是以堯舜禹周皆聖人也獨孔子為聖之大成史李蔡杜皆書祖也惟右軍為書之正鵠奈何泥古之徒不悟時中之妙専以一畫偏長一波故壯妄誇崇質之風豈知三代後賢兩晉前哲尚多太朴之意宣聖曰文質彬彬然後君子孫過庭云古不乖時今不同弊審斯二語與世推移規矩從心中和為的謂之曰天之未喪斯文逸少于今復起苟微若人吾誰與歸辨體夫人靈于萬物心主于百骸故心之所發藴之為道德顯之為經綸樹之為勛猷立之為節操宣之為文章運之為字迹爰作書契政代結繩刪述侔功神仙等妙苟非達人上智孰能玄鑒入神但人心不同誠如其面由中發外書亦云然所以染翰之士雖同法家揮豪之際各成體質考之先進固有説焉孫過庭曰矜斂者弊于拘束脫易者失于規矩躁勇者過于剽迫狐疑者溺于滯澀此乃舍其所長而指其所短也夫悟其所短恆止于苦難恃其所長多畫于自滿孫子因短而攻短豫也就長而刺長使藝成獨擅不安于一得之能學出専門益進于通方之妙理工辭拙知罪甘焉夫人之性情剛柔殊稟手之運用乖合互形謹守者拘斂襟懷縱逸者度越典則速徑者驚急無藴遲重者怯鬱不飛簡峻者挺掘鮮遒嚴密者緊實寡逸溫潤者妍媚少節標險者雕繪太苛雄偉者固愧容夷婉暢者又慚端厚莊質者蓋嫌魯朴流麗者復過浮華駛動者似欠精深纎茂者尚多散緩爽健者涉兹剽勇穩熟者缺彼新奇此皆因夫性之所偏而成其資之所近也他若偏泥古體者蹇鈍之迂儒自用為家者庸僻之俗吏任筆驟馳者輕率而踰律臨池猶豫者矜持而傷神専尚清徑者枯峭而罕姿獨工豐艷者濃鮮而乏骨此又偏好任情甘于暴棄者也苐施教者貴因材自學者先克已審斯二語厭倦兩忘與世推移量人進退何慮書體之不中和哉形質穹壤之間齒角爪翼物不俱全氣稟使然也書之體狀多端人之造詣各異必欲衆妙兼備古今恐無全書矣然天地之氣雨暘燠寒風雷霜雪來備時敘萬物榮滋極少過多化工皆覆故至聖有參贊之功君相有燮理之任皆所以節宣隂陽而調和元氣也是以人之所稟上下不齊性賦相同氣習多異不過曰中行曰狂曰狷而已所以人之于書得心應手千形萬狀不過曰中和曰肥曰瘦而已若而書也修短合度輕重協衡陰陽得宜剛柔互濟猶世之論相者不肥不瘦不長不短為端美也此中行之書也若専尚清徑偏乎瘦矣瘦則骨氣易徑而體態多瘠獨工豐艷偏乎肥矣肥則體態常妍而骨氣每弱猶人之論相者瘦而露骨肥而露肉不以為佳瘦不露骨肥不露肉乃為尚也使骨氣瘦峭加之以沉密雅潤端莊婉暢雖瘦而實腴也體態肥纎加之以便捷遒徑流麗峻潔雖肥而實秀也瘦而腴者謂之清妙不清則不妙也肥而秀者謂之豐豔不豐則不豔也所以飛燕與王嬙齊美太真與采蘋均麗譬夫桂之四分梅之五瓣蘭之孕馥菊之含叢芍藥之富艷芙渠之燦灼異形同翠殊質共芳也臨池之士進退于肥瘦之間深造乎中和之妙是猶自狂狷而進中行也慎毋自暴且棄哉品格夫質分髙下未必羣妙攸歸功有淺深詎能美善咸盡因人而各造其成就書而分論其等擅長殊技略有五焉一曰正宗二曰大家三曰名家四曰正源五曰傍流並列精鑒優劣定矣會古通今不激不厲規矩諳練骨態清和衆體兼能天然逸出巍然端雅奕矣奇鮮此謂大成已集妙入時中繼往開來永垂模軌一之正宗也篆隸章草種種皆知執使轉用優優合度數點衆畫形質頓殊各字終篇勢態逈别脫胎易骨變相改觀猶之世祿巨室萬寶盈藏時出具陳煥驚神目二之大家也真行諸體彼劣此優速徑遲工清秀豐麗或鼓骨格或炫標姿意氣不同性真悉露譬之醫卜相術聲譽廣馳本色偏工藝成獨步三之名家也溫而未厲恭而少安威而寡夷清而歉潤屈伸背向儼具儀刑揮灑弛張恪遵典則猶之清白舊家循良子弟未𢎞新業不墜先聲四之正源也縱放悍怒賈巧露鋒標置狂顛恣來肆往引倫蛇挂頓擬蟇蹲或枯瘦而巉巗或穠肥而泛濫譬之異卉奇珍驚時駭俗山雉片翰如鳯海鯨一鬛似龍也斯謂傍流其居五焉夫正宗尚矣大家其博名家其専乎正源其謹傍流其肆乎欲其博也先専與其肆也寧謹由謹而専自専而博規矩通審志氣和平寢食不忘心手無厭雖未必妙入正宗端越乎名家之列矣資學書之法則點畫攸同形之楮墨性情各異猶同源分派共樹殊枝者何哉資分高下學别淺深資學兼長神融筆暢苟非交善詎得從心書有體格非學弗知若學優而資劣作字雖工盈虛舒慘回互飛騰之妙用弗得也書有神氣非資弗明若資邁而學疏筆勢雖雄鈎揭導送提搶截拽之權度弗熟也所以資貴聰穎學尚浩淵資過乎學每失顛狂學過乎資猶存規矩資不可少學乃居先古人云蓋有學而不能未有不學而能者也然而學可勉也資不可強也天資縱哲標奇炫巧色飛魂絶于一時學識諳練入矩應規作範垂模于萬載孔門一貫之學竟以參魯得之甚哉學之不可不確也然人之資稟有溫弱者有剽勇者有遲重者有疾速者知克已之私加日新之學勉之不已漸入于安萬川會海成功則一若下筆之際枯澀拘攣苦迫蹇鈍是猶朽木之不可雕頑石之難乎琢也已譬夫學謳之徒字音板調愈唱愈熟若唇齒漏風喉舌砂短沒齒學之終奚益哉附評夫自周以後由漢以前篆隸居多楷式猶罕真章行草趨吏適時姑略上古且詳今焉夫道之統緒始自三代而定于東周書之源流肇自六爻而盛于兩晉宣尼稱聖時中逸少永寶為訓蓋謂通今會古集彼大成萬億斯年不可改易者也苐自晉以來染翰諸家史牒彰名縹緗著姓代不乏人論之難殫若品格居下真迹無傳豫之所列無復議焉蓋聞張鍾羲獻書家四絶良可據為軌躅爰作指南彼之四賢資學兼至者也然細詳其品亦有互差張之學鍾之資不可尚已逸少資敏乎張而學則稍歉學篤乎鍾而資則微遜伯英學進十矣資居七焉元常則反乎張逸少皆得其九子敬資稟英藻齊轍元常學力未深步塵張草惜其蘭折不永躓彼駿馳玉琢復磨疇追驥驟自云勝父有所恃也加以數年豈萍語哉六朝名家智永精熟學號深矣子雲飄舉資稱茂焉至于唐賢之資褚李標幟論乎學力陸顔蜚聲若虞若歐若孫若栁藏真張旭互有短長或學六七而資四五或資四五而學六七觀其筆勢生熟姿態端妍槩可辨矣宋之名家君謨為首齊範唐賢天水之朝書流砥柱李蘇黃米邪正相半總而言之傍流品也後之書法子昻正源鄧俞伯機亦可接武妍媚多優骨氣皆劣君謨學六而資七子昂學八而資四休哉蔡趙兩朝之脫穎也元章之資不減褚李學力未到任用天資觀其纎濃詭厲之態猶夫排沙見金耳子昂之學上擬陸顔骨氣乃弱酷似其人大抵宋賢資勝乎學元手學優乎資使稟元章之睿質勵子昂之精専宗君謨之遒徑師魯直之懸腕不惟越軌三唐超蹤宋元端居乎逸少之下子敬之上矣明興以來書迹雜糅景濂有貞仲珩伯虎僅接元蹤伯琦應禎孟舉原博稍知唐宋希哲存禮資學相等初範晉唐晚歸怪俗競為惡態駭諸凡夫所謂居夏而變夷棄陳而學許者也然令後學知宗晉唐其功豈少補邪文氏父子徵仲學比子昂資甚不逮筆氣生尖殊乏藴緻小楷一長秀整而已夀承休承資皆勝父入門既正克紹箕裘要而論之得處不逮豐祝之能邪氣不染二公之陋仲溫章革古雅微存公綬行真朴徑猶在髙陽道復僅有米芾之遺風民則立綱盡是趨時之利手若能以豐祝之資兼徵仲之學夀承之風逸休承之峭健不幾乎歐孫之再見耶若下筆之際苦澀寒酸如倪瓉之手縱加以老彭之年終無佳境也規矩天圓地方羣類象形聖人作則制為規矩故曰規矩方圓之至範圍不過曲成不遺者也大學之旨先務修齊正平皇極之疇首戒偏側反陂且帝王之典謨訓誥聖賢之性道文章皆託書傳垂教萬載所以明彛倫而淑人心也豈有放僻邪侈而可以昭蕩平正直之道者乎古今論書獨推兩晉然晉人風氣疏宕不羈右軍多優體裁獨妙書不入晉固非上流法不宗王詎稱逸品六代以厯初唐蕭羊以逮智永尚知趨向一體成家奈自懷素降及大年變亂古雅之度競為詭厲之形暨夫元章以豪逞卓犖之才好作鼓努驚奔之筆且曰大年之書愛其偏側之勢出于二王之外是謂子貢賢於仲尼丘陵髙於日月也豈有舍仲尼而可以言正道異逸少而可以為法書者哉奈何今之學書者每薄智永子昂似僧手誚真卿公權如將容夫顔栁過于嚴厚永趙少夫奇徑雖非書學之大成固自書宗之正脈也且穹壤之間莫不有規矩人心之良皆好乎中和宮室材木之相稱也烹炙滋味之相調也笙簫音律之相協也人皆恱之使其大小之不稱酸辛之不調宮商之不協誰復取之哉試以人之形體論之美丈夫貴有端厚之威儀髙逸之辭氣美女子尚有貞靜之德性秀麗之容顔豈有頭目手足粗邪癩瘇而可以稱美好者乎形象器用無庸言矣至于鳥之窠蜂之窩蛛之網莫不圓整而精密也可以書法之大道而禽蟲之不若乎此乃物情猶有知識也若夫花卉之清艷蘂瓣之疏藂莫不圓整而修對焉使其半而舒半而攣也皆瘠螙之病豈其本來之質哉獨怪偏側出王之語肇自元章一時之論致使淺近之輩爭賞豪末之奇不探中和之源徒規誕怒之病殆哉書脈危幾一縷矣况元章之筆妙在轉折結搆之間略不思齊鑒倣徒擬放縱剽勇之失妄誇具得神奇所謂舍其長而攻其短無其善而有其病也與東施之效顰復奚間哉圎為規以象天方為矩以象地方圎互用猶隂陽互藏所以用筆貴圎字形貴方既曰規矩又曰之至是圎乃圎神不可滯也方乃通方不可執也此由自悟豈能使知哉晉魏以前篆書稍長隸則少匾鍾王真行會合中和逮及信本以方增長降及旭素既方更圓或斜復直有如何本兩字促之若一字腰升本一字縱之若二字者然旭素飛草用之無害世但見草書若爾豫嘗見其郎官等帖則又端莊整飭儼然唐氣也後世庸陋無稽之徒妄作大小不齊之勢或以一字而包絡數字或以一傍而攢簇數形強合鈎連相排相紐點畫混沌突縮突伸如楊祕圖張汝弼馬一龍之流且自美其名曰梅花體正如瞽目丐人爛手折足繩穿老幼惡狀醜態齊唱俚詞遊行村市也夫梅花有盛開有半開有未開故爾參差不等若開放已足豈復有大小混雜者乎且花之向上倒下朝東面西猶書有仰收俯壓左顧右盼也如其一枝過大一枝過小多而六瓣少而四瓣又焉得謂之梅花耶形之相列也不雜不糅瓣之五出也不少不多由梅觀之可以知書矣彼有不察而漫學者寧非海上之逐臭哉常變宣尼疾固規矩諸説無乃固乎古人有缺波折刀之形畫沙印泥之勢無乃越于規矩之外哉夫字猶用兵同在制勝兵無常陳字無定形臨陳決機將書審勢權謀廟算務在萬全然陳勢雖變行伍不可亂也字形雖變體格不可踰也譬之青天白雲和風清露朗星皓月寒雪暑雷此造化之生機其常也迅霆激電霪雨颶風夏雹冬雷揚沙霾霧此隂陽之殺機其變也凡此之類勢不終朝四時皆然晦冥無晝矣所以脫巾跣足大笑狂歌園林丘壑知己相逢飲酒玩花或可乃爾如君親侍從之前大賓臨祭之日豈容狂放恣肆若此乎是故宮殿廟堂典章紀載真為首尚表牘亭館移文題勒行乃居先借使奏狀碑署潦草顛狂褻悖何甚哉信知真行為書體之常草法乃一時之變趙一非之豈無謂哉所云草體有别法焉撥鐙提捺真行相通留放鈎環勢態逈異旋轉圎暢屈折便險點綴精彩挑竪枯徑波躍耿決飛度飄揚流注盤紆駐引窈繞頓之以沉鬱奮之以奔馳奕之以翩􅀈激之以峭拔或如篆籀或如古隸或如急就或如飛白又若衆獸駭首而還跱羣鳥舉翅而欲翔猿猴騰挂乎藂林蛟龍蟠蜿于山澤隨情而綽其態審勢而揚其威每筆皆成其形兩字各異其體草書之妙畢于斯矣至于行草則復兼之衄挫行藏緩急措置損益于真草之間會通于意態之際奚慮不臻其妙哉正奇書法要旨有正與奇所謂正者偃仰頓挫揭按照應筋骨威儀確有節制是也所謂奇者參差起復騰凌射空風情恣態巧妙多端是也奇即運于正之內正即列于奇之中正而無奇雖莊嚴沉實恆朴厚而少文奇而弗正雖雄爽飛姸多譎厲而乏雅奈夫賞鑑之家每指豪端努奮之巧不悟規矩法度之踰臨池之士每炫技于形勢猛誕之微不求工于性情骨氣之妙是謂輕道德而重功利退忠直而進姦雄也好奇之説伊誰始哉伯英急就元常楷迹去古未逺猶有分隸餘風逸少一出揖讓禮樂森嚴有法神彩攸煥正奇混成也子敬始和父韻後宗伯英風神散逸爽朗多姿梁武稱其絶妙超羣譽之浮實唐文目以拘攣餓隸貶之太深孫過庭曰子敬以下鼓努為力標置成體工用不侔神情懸隔斯論得之書至子敬尚奇之門開矣嗣後智永専範右軍精熟無奇此學其正而不變者也羊欣思齊大令舉止依樣此學其奇而不變者也逮夫世南傳之智永內含剛柔立意沉粹及其行草遒媚不凡然其筋力稍覺寬骳矣李雍初師逸少擺脫舊習筆力更新下手挺聳終失窘迫律以大成殊越彀率此行真之初變也歐陽信本亦擬右軍易方為長險徑瘦硬崛起削成若觀行草復太猛峭矣褚氏登善始依世南晚追逸少遒徑溫婉豐美富艷苐乏天然過于雕刻此真行之再變也考諸永淳以前規模大都清雅暨夫開元以後氣習漸務威嚴顔清臣蠶頭燕尾閎偉雄深然沉重不清暢矣栁誠懸骨鯁氣剛耿介特立然嚴厲不溫和矣此真書之三變也張氏從申源出子敬筆氣絶似北海抑揚低昻則甚雕琢矣釋氏懷素流從伯英援豪大似驚蛇圎轉牽掣則甚詭秃矣此草行之三變也書變若爾豈徒文兵云哉大抵不變者情拘于守正好變者意刻于探奇正奇既分為二書法自醇入漓矣然質朴端重以為正剽急駭動以為奇非正奇之妙用也世之厭常以喜新者每舍正而慕奇豈知奇不必求久之自至者哉假使雅好之士留神翰墨窮搜博究月習嵗勤分布條理諳練于胸襟運用抑揚精熟于心手自然意先筆後妙逸忘情墨灑神凝從容中道此乃天然之巧自得之能猶夫西子毛嬙天姿國色不施粉黛輝光動人矣何事求竒于意外之筆後垂超世之聲哉中和書有性情即筋力之屬也言乎形質即標格之類也真以方正為體圎奇為用草以圎奇為體方正為用真則端楷為本作者不易速工草則簡縱居多見者亦難便曉不真不草行書出焉似真而兼乎草者行真也似草而兼乎真者行草也圎而且方方而復圓正能含奇竒不失正會乎中和斯為美善中也者無過不及是也和也者無乖無戻是也然中固不可廢和和亦不可離中如禮節樂和本然之體也禮過于節則嚴矣樂純乎和則淫矣所以禮尚從容而不迫樂戒奪倫而皎如中和一致位育可期况夫翰墨者哉方圓互成正奇相濟偏有所著即非中和使楷與行真而偏不拘鈍即稜峭矣行草與草而偏不寒俗即放誕矣不知正奇參用斯可與權權之謂者稱物平施即中和也唐之諸賢雖各成家然有一手而獨擅一二長者有多能而反拙一二體者臨學之士貴擇善而從焉陸柬之得法于世南晚擅出藍之譽豫嘗見其所書蘭亭詩無一筆不出右軍苐少飄逸和暢之妙爾張伯髙世目為顛然其見擔夫爭逍聞鼓吹觀舞劍而知筆意固非常人也其真書絶有繩墨草字奇幻百出不踰規矩乃伯英之亞懷素豈能及哉米芾乃誚其變亂古法驚諸凡夫何其苛于責人而昏于自反耶顔清臣雖以真楷知名實過厚重若其行真如鹿脯帖行草如爭坐祭姪帖又舒和遒徑豐麗超動上擬逸少下追伯施固出歐李輩也獨其自敘一帖粗魯詭異且過鬱濁酷非平日意態米芾乃獨倣之亦好奇之病爾唐書雖有三變虞褚之真與行草陸李之行真魯公之行草率更之真書長史之飛草所謂出類拔萃固非隨波逐流者也懷素聖母藏真亦多合作大字千文則穠肆矣小字千文太平淡矣世傳自敘帖殊過枯誕不足法也主善以為師寧非步王之階梯哉老少書有老少區别淺深勢雖異形理則同體所謂老者結搆精密體裁髙古巖岫聳峰旌旗列陳是也所謂少者氣體充和標格雅秀百般滋味千種風流是也老而不少雖古拙峻偉而鮮豐茂秀麗之容少而不老雖婉暢纎妍而乏沉重典實之意二者混為一致相待而成者也試以人品喻之謀猷諳練學識宏深必稱黃髮之彥詞氣清亮舉動利便恆數俊髦之英老乃書之筋力少則書之姿顔筋力尚強健姿顔貴美悅會之則並善析之則兩乖融而通焉書其幾矣玄鑒之士求老于典則之間探少于神情之內若其規模宏逺意思窈窕抑揚旋折恬曠雍容無老無少難乎名狀如天仙玉女不能辨其春秋此乘之上也初視雖少細觀實老丰采秀潤結束巍峩引拂輕揚氣度凜毅世所謂少年老成乘之次也鱗羽參差峰巒掩映提撥飛健縈紆委婉衆體異勢各字成形乃如一堂之中老少羣聚則又次焉筋力雄壯骨氣峻潔劍拔弩張熊蹲虎踞祗見其老不見其少有若師儒夀耉正色難犯又其次焉燦爛似錦艷麗如花初視煥彩詳觀散怯正如平時誇伐自稱𢎞濟一遇艱大節義遂虧抑又其次矣若夫任筆成形聚墨為勢漫作偏欹之相妄呈險放之姿踈縱無歸輕浮鮮著風斯下矣復何齒哉神化書之為言散也舒也意也如也欲書必舒散懷抱至于如意所願斯可稱神書不變化匪足語神也所謂神化者豈復有外于規矩哉規矩入巧乃名神化固不滯不執有圎通之妙焉况大造之玄功宣泄于文字神化也者即天機自發氣韻生動之謂也日月星辰之經緯寒暑晝夜之代遷風雲雷雨之聚散山嶽河海之流峙非天地之變化乎髙士之振衣長嘯揮麈談玄佳人之臨鏡拂花舞袖流盼如艷卉之迎風泫露似好鳥之調舌搜翎千態萬狀愈出愈奇更若煙霏林影有相難著潛鱗翔翼無迹可尋此萬物之變化也人之于書形質法度端厚和平參互錯綜玲瓏飛逸誠能如是可以語神矣世之論神化者徒指體勢之異常豪端之奮筆同聲而贊賞之所識何淺陋哉約本其由深探其旨不過曰相時而動從心所欲云爾宣尼逸少道統書源匪由悉邪也鄉黨之恂恂在朝之侃侃執圭之踧踧私覿之怡怡于魯而章甫適宋而縫掖至夫漢方朔贊意涉瓌奇燕樂毅論情多抑鬱修禊集敘興逸神怡私門誓文情拘氣塞此皆相時而動根乎隂陽舒慘之機從心所欲溢然關雎哀樂之意非夫心手交暢焉能美善兼通若是哉相時而動或知其情從心所欲鮮悟其理蓋欲正而不欲邪欲熟而不欲生人之恆心也規矩未能精諳心手尚在矜疑將志帥而氣不充意先而筆不到矣此皆不能從心之所欲也至于欲既從心豈復矩有少踰者耶宣尼既云從心復云不踰者恐越于中道之外爾譬之投壺引射豈不欲中哉手不從心發而不中矣然不動則不變能變即能化苟非至誠焉有能動者乎澄心定志博習専研字之全形宛爾在目筆之妙用悠然忘思自然腕能從臂指能從心瀟灑神飛徘徊翰逸如庖丁之解牛掌上之弄丸執筆者自難揣摩撫卷者豈能測量哉中庸之為物不二生物不測孟子曰深造自得左右逄源生也逄也皆由不二深造得之是知書之欲變化也至誠其志不息其功將形著明動一以貫萬變而化焉聖且神矣噫此由心悟不可言傳字者孳也書者心也字雖有象妙出無為心雖無形用從有主初學條理必有所事因象而求意終及通會行所無事得意而忘象故曰由象識心徇象喪心象不可著心不可離未書之前定志以帥其氣將書之際養氣以充其志勿忘勿助由勉入安斯于書也無間然矣夫雨粟鬼哭感格神眀徵往俟來有為若是法書仙手致中極和可以發天地之玄微宣道義之藴奧繼往聖之絶學開後覺之良心功將禮樂同休名與日月並曜豈惟明忩淨几神怡務間筆硯精良人生清福而已哉心相蓋聞德性根心睟盎生色得心應手書亦云然人品既殊性情各異筆勢所運邪正自形書之心主張布算想像化裁意在筆端未形之相也書之相旋折進退威儀神彩筆隨意發既形之心也試以人品喻之宰輔則貴有愛君容賢之心正直忠厚之相將帥則貴有盡忠立節之心智勇萬全之相諫議則貴有正道格君之心謇諤不阿之相隱士則貴有樂善無悶之心遺世仙舉之相由此例推儒行也才子也佳人也僧道也莫不有本來之心合宜之相者所謂有諸中必形諸外觀其相可識其心栁公權曰心正則筆正余今曰人正則書正心為人之帥心正則人正矣筆為書之充筆正則書正矣人由心正書由筆正即詩云思無邪禮云無不敬書法大旨一語括之矣嘗鑒古迹聊指前人世不俱聞略焉弗舉如桓溫之豪悍王敦之揚厲安石之躁率跋扈剛愎之情自露于豪楮間也他如李雍之挺竦蘇軾之肥欹米芾之努肆亦非純粹貞良之士不過嘯傲風騷之流爾至于褚遂良之遒徑顔真卿之端厚栁公權之莊嚴雖于書法少容夷俊逸之妙要皆忠義直亮之人也若夫趙孟俯之書溫潤間雅似接右軍正脈之傳妍媚纎柔殊乏大節不奪之氣所以天水之裔甘心仇讎之祿也故欲正其書者先正其筆欲正其筆者先正其心若所謂誠意者即以此心端已澄神勿虛勿二也致知者即以此心審其得失明乎取舍也格物者即以此心博習精察不自専用也正心之外豈更有説哉由此篤行至于深造自然秉筆思生臨池志逸新中更新妙之益妙非惟不奇而自奇抑亦巳正而物正矣夫經卦皆心畫也書法乃傳心也如罪斯言為迂豫固甘焉勿避矣取舍蘇米之迹世爭臨摹豫獨哂為效顰者豈妄言無謂哉蘇之點畫雄徑米之氣勢超動是其長也蘇之穠聳稜側米之猛放驕淫是其短也皆緣天資雖勝學力乃疏手不從心藉此掩醜譬夫優伶在場歌喉不接假彼鑼鼓亂兹音聲耳夫顰一也西子以顰而加妍東施效之而增醜何哉西子眀眸皓齒光彩射人閨情幽怨痛心攢眉悽悽楚楚可憫可憐是知顰乃其病非其常也使其館娃宮中姑蘇臺上懨懨悶悶蹙鎖蛾眉夫差豈復見寵耶東施本無麗質妄自學其愁眉反見陋媸殊可憎惡臨擬之士取長舍短豈非善學者哉抑自周秦以後逸少以前専尚篆隸罕見真行簡朴端厚不皆文質兩彬缺勒殘碑無復完神可倣逸少一出會通古今書法集成模楷大定自是而下優劣互差試舉顯名今世遺迹僅存者拔其美善指其瑕疵庶取舍既明則趨向可定矣智永世南得其寬和之量而少俊邁之奇歐陽詢得其秀徑之骨而乏溫潤之容褚遂良得其鬱壯之筋而鮮安間之度李雍得其豪挺之氣而失之竦窘顔栁得其莊毅之操而失之魯獷旭素得其超逸之興而失之驚怪陸徐得其恭儉之體而失之頺拘過庭得其逍遙之趣而失之險散蔡襄得其密厚之貌庭堅得其提衄之法孟俯得其溫雅之態然蔡過乎嫵重趙専乎妍媚魯直雖知執筆而伸腳桂手體格掃地矣蘇軾獨宗顔李米芾復兼褚張蘇似肥艷美婢擡作夫人舉止邪陋而大足當令掩口米若風流公子染患癰疣馳馬試劍而叫笑旁若無人數君之外無暇詳論也擇長而師之所短而改之在臨池之士玄鑒之精爾陸友仁研北雜志云蔡君謨摹倣右軍諸帖形模骨肉纎悉具備莫敢踰軼至米元章始變其法超規越矩雖有生氣而筆法悉絶矣豫謂君謨之書宋代巨擘蘇黃與米資近大家學入傍流非君謨可同語也朱晦翁亦謂字被蘇黃寫壞并筆法悉絶之言兩語皆刻矣數公亦有筆法不盡寫壞體格多有踰越蓋其學力未能入室之故也數君之中惟元章更易起眼且易下筆每一經目便思倣模初學之士切不可看趨向不正取舍不明徒擬其所病不得其所能也米書之源出自顔褚如要學米先栁入歐由歐趨虞自虞入褚學至于是自可窺大家之門元章亦拜下風矣如前賢真迹未易得見擇其善帖精専臨倣十年之後方以元章參看庶知其短而取其長矣若逸少聖教序記非有二十年精進之功不能知其妙亦不能下一筆宜乎學者寥寥也此可與知者道之功序臨池賞鑑代不虛人評論體勢悉非真諦擬形于雲石譬象于龍蛇外狀其浮華內迷其實理至若無知率易之輩妄認功無百日之談豈知王道本無近功成書亦非嵗月哉初學之士先立大體橫直安置對待布白務求其均齊方正矣然後定其筋骨向背往還開合連絡務求雄健貫通也次又尊其威儀疾徐進退俯仰屈伸務求端莊溫雅也然後審其神情戰蹙單疊回帶翻藏機軸圎融風度灑落或字餘而勢盡或筆斷而意連平順而凜鋒芒健徑而融圭角引伸而觸類書之能事畢矣然計其始終非四十載不能成也所以逸少之書五十有二而稱妙宣尼之學六十之後而從心古今以來莫非晚進獨子敬天資既縱家範有方入門不必旁求風氣且當専尚年幾不惑便著髙聲子敬之外豈復多見耶苐世之學者不得其門從何進手必先臨摹方有定趨始也専宗一家次則博研衆體融天機于自得會羣妙于一心斯于書也集大成矣苐昔賢遺範優劣紛紜倣之貴似審之尚精倣之不似來續尾之譏審之弗精啓叩頭之誚舍其所短取其所長始自平整而追秀拔終自險絶而歸中和心與筆俱専月繼年不厭譬之撫絃在琴妙音隨指而發省括在弩逸矢應鵠而飛意在筆前翰從豪轉後聖再起吾言弗更矣若分布少明即思縱巧運用不熟便欲標奇是未學走而先學趨也書何容易哉學書次苐前言巳槩拘局之士未免懼疑姑以淺言俟彼易曉大率書有三戒初書分布戒不均與欹繼知規矩戒不活與滯終能純熟戒狂怪與俗若不均且欹如耳目口鼻開濶長促邪立偏坐不端正矣不活與滯如土塑木雕不説不笑板定固窒無生氣矣狂怪與俗如醉酒巫風丏兒村漢胡言亂語顛仆醜陋矣又書有三要第一要清整清則點畫不混雜整則形體不偏邪第二要溫潤溫則性情不驕怒潤則折挫不枯澀第三要間雅間則運用不矜持雅則起伏不恣肆以斯數語慎思篤行未必能超入上乘定可為卓焉名家矣若前所列規矩正奇老少神化諸篇隂陽向背緩急抑揚等法蓋有彼具而此略所當參用以相通者也器用筆陳圖曰紙者陳也筆者刀矟也墨者鍪甲也硯者城池也孫過庭云疑是右軍所製尚可啓發童蒙常俗所傳不藉編録又云筆勢論十二章文鄙理疏意乖言拙詳其旨趣殊非右軍豫觀其論固難盡宗摘其數言不無合旨孫子外之斯語苛矣苐陳圖以墨擬之鍪甲以硯譬之城池喻失其理恐亦非右軍也豫試論之以俟君子夫身者元帥也心者軍師也手者副將也指者士卒也紙者地形也筆者戈戟也墨者糧草也硯者囊槖也紙不光細譬之驍將駿馬行于荆棘泥濘之場馳驟當先弗能也筆不穎健譬之志奮力壯手持折缺朽鈍之兵斬斫擊刺弗能也墨不精玄譬之養將練兵糧草不敷將有飢色何以作氣硯不硎蓄譬之師旅方興命在餱糧餽餉乏絶何以壯威四者不可廢一紙筆猶乃居先俗語云能書不擇筆斷無是理也夫工欲善其事必先利其器木石金玉之工刀鋸爐銼之屬苟不精利雖有雕鏤切磋之技離婁公輸之能將安施其巧哉俗有署書以騣以帚間或可用若捲箬搏素描絲露骨以示老健之形風神之態至于畫塵影火聚米注沙頽骫無致俗濁無藴借令逸少家奴有靈寧不撫掌于泉下哉知識嗟哉能書者固絶真手善鑒者甚罕真眼也學書者不可視之為易不可視之為難易則忽而怠心生難則畏而止心起矣鑒書者不可求之淺不可求之深淺則涉略泛觀而不究其妙深則吹毛索瘢而反過于譎矣學書之法考之往言參之今論無事再喙矣姑以鑒書之法照後賢焉大要開卷之初猶髙人君子之逺來遙而望之標格威儀清秀端偉飄颻若神仙魁梧如尊貴矣及其入門近而察之氣體充和容止雍穆厚德若虛愚威重如山嶽矣逮其在席器宇恢乎有容辭氣溢然傾聽挫之不怒惕之不驚誘之不移陵之不屈道氣德輝藹然服衆令人鄙吝自消矣又如佳人之艷麗含情若美玉之潤彩奪目玩之而愈可愛見之而不忍離此即真手真眼意氣相投也故論書如論相觀書如觀人賞鑑能事大槩在斯矣然人品既殊識見亦異有耳鑒有目鑒有心鑒若遇卷初展邪正得失何手何代眀如親覩不俟終閲此謂識書之神心鑒也若據若賢有若帖某卷在某處不恤資財而逺購焉此贏錢之徒收藏以誇耀耳鑒也若開卷未玩意法先查跋語誰賢紙墨不辨古今只據印章孰賞聊指幾筆虛口重贊此目鑒也耳鑒者謂之莽兒審樂目鑒者謂之村嫗玩花至于昏憒應聲之流妄傲無稽之輩胸中豪無實見遇字便稱能知家藏一二帖卷真偽漫爾弗求筆才歲月塗描點畫茫焉未曉設會神通佳迹每嗟精妙無奇或經邪俗偽書反嘆誤愆多致此謂吠日吠雪駭罽駭龍考索拘乎淺陋好惡任彼偏私先有成心將何定見不若村野愚氓反有公論也評鑒書迹要訣何存溫而厲威而不猛恭而安宣尼德性渾然中和氣象也執此以觀人味此以自學善書善鑒具得之矣書法雅言
